name: Publish container image

# Build the MCP server image in CI (no build-time limit) and push it to GHCR, so it
# can be deployed on Kakao Cloud (PlayMCP in KC) via "이미지 등록" (image registration).
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "Dockerfile"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/taxfood-mcp:latest
            ghcr.io/${{ github.repository_owner }}/taxfood-mcp:${{ github.sha }}
